<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe do Livro — BookFinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-top">
      <a class="nav-logo" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span class="logo-text">Book<span>Finder</span></span>
      </a>
      <button class="nav-hamburger" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="navbar-links-row" id="navbar-links">
      <div class="navbar-links-inner">

        <a class="nav-link" href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Início
        </a>

        <a class="nav-link" href="#" onclick="navTo(event,'reviews')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Mais Vendidos
        </a>

        <a class="nav-link" href="#" onclick="navTo(event,'rating')">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
            <polygon points="10,1 12.9,7 19.5,7.6 14.5,12 16.2,18.5 10,15 3.8,18.5 5.5,12 0.5,7.6 7.1,7"/>
          </svg>
          Mais Avaliados
        </a>

        <a class="nav-link" href="#" onclick="navTo(event,'year')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Novidades
        </a>

        <div class="nav-dropdown nav-link" tabindex="0" onclick="toggleDropdown(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          Categorias
          <svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <div class="nav-dropdown-menu" id="cat-dropdown"></div>
        </div>

      </div>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ── -->
  <div class="detail-layout">

    <!-- Breadcrumb -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="index.html">Início</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      <a href="javascript:history.back()">Resultados</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      <span id="breadcrumb-title">Livro</span>
    </nav>

    <!-- ── MAIN BOOK CARD ── -->
    <div class="book-detail-card" id="book-detail-card">
      <div class="bk-loading" style="grid-column:1/-1"><div class="bk-spinner"></div><p>Carregando livro...</p></div>
    </div>

    <!-- ── LISTINGS ── -->
    <div class="section-card" id="listings-section">
      <div class="section-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Onde comprar — anúncios disponíveis
      </div>
      <div style="overflow-x:auto;">
        <table class="listings-table" id="listings-table">
          <thead>
            <tr>
              <th>Vendedor</th>
              <th>Condição</th>
              <th>Frete</th>
              <th>Preço</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="listings-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ── EDITIONS ── -->
    <div class="section-card" id="editions-section" style="display:none">
      <div class="section-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="8 6 2 12 8 18"/><polyline points="16 6 22 12 16 18"/>
        </svg>
        Edições disponíveis
      </div>
      <div class="editions-grid" id="editions-grid"></div>
    </div>

  </div><!-- /.detail-layout -->

  <!-- ── FOOTER ── -->
  <footer>
    <p>Trabalho acadêmico — Banco de Dados · <strong>Amazon Book Dataset</strong></p>
  </footer>

  <script src="app.js"></script>
  <script>
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildStarsHTML(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += `<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <polygon points="10,1 12.9,7 19.5,7.6 14.5,12 16.2,18.5 10,15 3.8,18.5 5.5,12 0.5,7.6 7.1,7"
            class="${i <= Math.round(rating) ? 'star-filled' : 'star-empty'}" />
        </svg>`;
      }
      return html;
    }

    // ── Nav helpers ──────────────────────────────────────────
    function navTo(e, sort) {
      e.preventDefault();
      window.location.href = `results.html?sort=${sort}&q=`;
    }

    function toggleMobileNav() {
      document.getElementById('navbar-links').classList.toggle('open');
    }

    function toggleDropdown(el) {
      if (window.innerWidth <= 700) el.classList.toggle('open');
    }

    function buildNavDropdown() {
      const menu = document.getElementById('cat-dropdown');
      menu.innerHTML = '';
      getAllCategories(BOOKS_DATA).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'nav-dropdown-item';
        btn.innerHTML = `<span class="cat-dot"></span>${cat}`;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `results.html?cat=${encodeURIComponent(cat)}&q=`;
        });
        menu.appendChild(btn);
      });
    }

    // ── Load book ────────────────────────────────────────────
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');

      try {
        await loadBooks();
      } catch (err) {
        showLoadError(document.getElementById('book-detail-card'), init);
        return;
      }

      buildNavDropdown();

      const book = getBookById(id);

      if (!book) {
        document.getElementById('book-detail-card').innerHTML = `
          <div style="padding:60px;text-align:center;grid-column:1/-1;color:var(--text-mid)">
            <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
            <div style="font-weight:700;font-size:1.2rem">Livro não encontrado</div>
            <a href="index.html" style="color:#007185;margin-top:10px;display:inline-block">← Voltar ao início</a>
          </div>`;
        return;
      }

      document.title = `${book.title} — BookSearch`;
      document.getElementById('breadcrumb-title').textContent = book.title;

      renderMain(book);
      renderListings(book);
      renderEditions(book);
    }

    // ── Render main info ─────────────────────────────────────
    function renderMain(book) {
      const card = document.getElementById('book-detail-card');

      const coverHTML = book.coverUrl
        ? `<img class="detail-cover-img" src="${book.coverUrl}" alt="${escHtml(book.title || '')}" />`
        : `<div class="detail-cover-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
               <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
             </svg>
             <p>Sem capa disponível</p>
           </div>`;

      const catBadges = (book.categories || [])
        .map(c => `<span class="badge badge-orange">${escHtml(c)}</span>`)
        .join('');

      const rating  = book.rating || 0;
      const reviews = book.reviews || 0;
      const listings = book.listings || [];
      const editions = book.editions || [];

      // Best price: usa listings se houver, senão cai no preço do livro
      const bestPrice = listings.length
        ? Math.min(...listings.map(l => l.price ?? Infinity))
        : (book.price ?? 0);
      const bestListing = listings.find(l => l.price === bestPrice);

      card.innerHTML = `
        <div class="detail-cover-col">${coverHTML}</div>
        <div class="detail-info-col">
          <div class="detail-badges">${catBadges}</div>
          <h1 class="detail-title">${escHtml(book.title || 'Sem título')}</h1>
          <p class="detail-author">por <strong>${escHtml(book.author || 'Autor desconhecido')}</strong></p>

          <div class="detail-rating-row">
            <div class="stars">${buildStarsHTML(rating)}</div>
            <span class="detail-rating-score">${rating.toFixed(1)}</span>
            <span class="detail-rating-count">${reviews.toLocaleString('pt-BR')} avaliações</span>
          </div>

          <p class="detail-desc">${escHtml(book.description || 'Descrição não disponível.')}</p>

          <div class="detail-meta-grid">
            <div class="meta-item">
              <div class="meta-label">Melhor preço</div>
              <div class="meta-value" style="color:var(--red)">${fmtPrice(bestPrice)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Editora</div>
              <div class="meta-value">${escHtml(book.publisher || '—')}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Ano</div>
              <div class="meta-value">${book.year || '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Páginas</div>
              <div class="meta-value">${book.pages || '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">ISBN</div>
              <div class="meta-value" style="font-family:monospace;font-size:.8rem">${escHtml(book.isbn || '—')}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Edições</div>
              <div class="meta-value">${editions.length} formato${editions.length!==1?'s':''}</div>
            </div>
          </div>

          <div style="margin-top:8px">
            <a class="btn-amazon" href="${escHtml(bestListing?.url || '#')}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Comprar na Amazon — ${fmtPrice(bestPrice)}
            </a>
          </div>
        </div>
      `;
    }

    // ── Render listings table ────────────────────────────────
    function renderListings(book) {
      const tbody = document.getElementById('listings-body');
      const listings = book.listings || [];

      if (listings.length === 0) {
        document.getElementById('listings-section').innerHTML = `
          <div class="bk-error" style="padding:40px 20px">
            <div class="bk-error-icon">🛒</div>
            <p>Nenhum anúncio disponível para este livro no momento.</p>
          </div>`;
        return;
      }

      const conditionLabel = { new: 'Novo', used: 'Usado', refurbished: 'Recondicionado' };
      const conditionClass = { new: 'condition-new', used: 'condition-used', refurbished: 'condition-refurbished' };

      listings.forEach(listing => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="seller-name">${escHtml(listing.seller || 'Vendedor')}</span></td>
          <td>
            <span class="seller-condition ${conditionClass[listing.condition] || ''}">
              ${conditionLabel[listing.condition] || listing.condition || '—'}
            </span>
          </td>
          <td>${escHtml(listing.shipping || '—')}</td>
          <td><span class="listing-price">${fmtPrice(listing.price)}</span></td>
          <td>
            <a class="btn-amazon" href="${escHtml(listing.url)}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Ver na Amazon
            </a>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ── Render editions ──────────────────────────────────────
    function renderEditions(book) {
      if (!book.editions || book.editions.length <= 1) return;

      const section = document.getElementById('editions-section');
      const grid    = document.getElementById('editions-grid');
      section.style.display = '';

      const formatIcon = { Hardcover: '📗', Paperback: '📄', Kindle: '📱', Audiobook: '🎧' };

      book.editions.forEach((ed, i) => {
        const card = document.createElement('div');
        card.className = 'edition-card' + (i === 0 ? ' current' : '');
        card.innerHTML = `
          <div style="font-size:1.4rem">${formatIcon[ed.format] || '📚'}</div>
          <div class="edition-format">${escHtml(ed.format || 'Edição')}</div>
          <div class="edition-year">${ed.year || '—'}</div>
          <div class="edition-isbn">ISBN: ${escHtml(ed.isbn || '—')}</div>
          <div class="edition-price">${fmtPrice(ed.price)}</div>
          ${i === 0 ? '<span class="badge badge-orange" style="margin-top:4px">Edição atual</span>' : ''}
        `;
        grid.appendChild(card);
      });
    }

    init();
  </script>
</body>
</html>
