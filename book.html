<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhe do Livro — BookSearch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="nav-logo" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span class="logo-text">Book<span>Search</span></span>
      </a>

      <form class="nav-search" onsubmit="handleNavSearch(event)">
        <input type="text" id="nav-input" placeholder="Pesquisar livros, autores..." />
        <button type="submit" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </form>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ── -->
  <div class="detail-layout">

    <!-- Breadcrumb -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="index.html">Início</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      <a href="javascript:history.back()">Resultados</a>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      <span id="breadcrumb-title">Livro</span>
    </nav>

    <!-- ── MAIN BOOK CARD ── -->
    <div class="book-detail-card" id="book-detail-card">
      <!-- populated by JS -->
    </div>

    <!-- ── LISTINGS ── -->
    <div class="section-card" id="listings-section">
      <div class="section-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Onde comprar — anúncios disponíveis
      </div>
      <div style="overflow-x:auto;">
        <table class="listings-table" id="listings-table">
          <thead>
            <tr>
              <th>Vendedor</th>
              <th>Condição</th>
              <th>Frete</th>
              <th>Preço</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="listings-body"></tbody>
        </table>
      </div>
    </div>

    <!-- ── EDITIONS ── -->
    <div class="section-card" id="editions-section" style="display:none">
      <div class="section-card-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="8 6 2 12 8 18"/><polyline points="16 6 22 12 16 18"/>
        </svg>
        Edições disponíveis
      </div>
      <div class="editions-grid" id="editions-grid"></div>
    </div>

  </div><!-- /.detail-layout -->

  <!-- ── FOOTER ── -->
  <footer>
    <p>Trabalho acadêmico — Banco de Dados · <strong>Amazon Book Dataset</strong></p>
  </footer>

  <script src="app.js"></script>
  <script>
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildStarsHTML(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += `<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <polygon points="10,1 12.9,7 19.5,7.6 14.5,12 16.2,18.5 10,15 3.8,18.5 5.5,12 0.5,7.6 7.1,7"
            class="${i <= Math.round(rating) ? 'star-filled' : 'star-empty'}" />
        </svg>`;
      }
      return html;
    }

    // ── Load book ────────────────────────────────────────────
    function init() {
      const params = new URLSearchParams(window.location.search);
      const id     = params.get('id');
      const book   = getBookById(id);

      // restore nav search
      const saved = loadSearch();
      document.getElementById('nav-input').value = saved;

      if (!book) {
        document.getElementById('book-detail-card').innerHTML = `
          <div style="padding:60px;text-align:center;grid-column:1/-1;color:var(--text-mid)">
            <div style="font-size:2.5rem;margin-bottom:12px">🔍</div>
            <div style="font-weight:700;font-size:1.2rem">Livro não encontrado</div>
            <a href="index.html" style="color:#007185;margin-top:10px;display:inline-block">← Voltar ao início</a>
          </div>`;
        return;
      }

      document.title = `${book.title} — BookSearch`;
      document.getElementById('breadcrumb-title').textContent = book.title;

      renderMain(book);
      renderListings(book);
      renderEditions(book);
    }

    // ── Render main info ─────────────────────────────────────
    function renderMain(book) {
      const card = document.getElementById('book-detail-card');

      const coverHTML = book.coverUrl
        ? `<img class="detail-cover-img" src="${book.coverUrl}" alt="${escHtml(book.title)}" />`
        : `<div class="detail-cover-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
               <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
             </svg>
             <p>Sem capa disponível</p>
           </div>`;

      const catBadges = book.categories
        .map(c => `<span class="badge badge-orange">${escHtml(c)}</span>`)
        .join('');

      // Best price from listings
      const bestPrice = Math.min(...book.listings.map(l => l.price));
      const bestListing = book.listings.find(l => l.price === bestPrice);

      card.innerHTML = `
        <div class="detail-cover-col">${coverHTML}</div>
        <div class="detail-info-col">
          <div class="detail-badges">${catBadges}</div>
          <h1 class="detail-title">${escHtml(book.title)}</h1>
          <p class="detail-author">por <strong>${escHtml(book.author)}</strong></p>

          <div class="detail-rating-row">
            <div class="stars">${buildStarsHTML(book.rating)}</div>
            <span class="detail-rating-score">${book.rating.toFixed(1)}</span>
            <span class="detail-rating-count">${book.reviews.toLocaleString('pt-BR')} avaliações</span>
          </div>

          <p class="detail-desc">${escHtml(book.description)}</p>

          <div class="detail-meta-grid">
            <div class="meta-item">
              <div class="meta-label">Melhor preço</div>
              <div class="meta-value" style="color:var(--red)">${fmtPrice(bestPrice)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Editora</div>
              <div class="meta-value">${escHtml(book.publisher)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Ano</div>
              <div class="meta-value">${book.year}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Páginas</div>
              <div class="meta-value">${book.pages}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">ISBN</div>
              <div class="meta-value" style="font-family:monospace;font-size:.8rem">${escHtml(book.isbn)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Edições</div>
              <div class="meta-value">${book.editions.length} formato${book.editions.length>1?'s':''}</div>
            </div>
          </div>

          <div style="margin-top:8px">
            <a class="btn-amazon" href="${escHtml(bestListing?.url || '#')}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Comprar na Amazon — ${fmtPrice(bestPrice)}
            </a>
          </div>
        </div>
      `;
    }

    // ── Render listings table ────────────────────────────────
    function renderListings(book) {
      const tbody = document.getElementById('listings-body');

      const conditionLabel = { new: 'Novo', used: 'Usado', refurbished: 'Recondicionado' };
      const conditionClass = { new: 'condition-new', used: 'condition-used', refurbished: 'condition-refurbished' };

      book.listings.forEach(listing => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="seller-name">${escHtml(listing.seller)}</span></td>
          <td>
            <span class="seller-condition ${conditionClass[listing.condition] || ''}">
              ${conditionLabel[listing.condition] || listing.condition}
            </span>
          </td>
          <td>${escHtml(listing.shipping)}</td>
          <td><span class="listing-price">${fmtPrice(listing.price)}</span></td>
          <td>
            <a class="btn-amazon" href="${escHtml(listing.url)}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Ver na Amazon
            </a>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ── Render editions ──────────────────────────────────────
    function renderEditions(book) {
      if (!book.editions || book.editions.length <= 1) return;

      const section = document.getElementById('editions-section');
      const grid    = document.getElementById('editions-grid');
      section.style.display = '';

      const formatIcon = { Hardcover: '📗', Paperback: '📄', Kindle: '📱', Audiobook: '🎧' };

      book.editions.forEach((ed, i) => {
        const card = document.createElement('div');
        card.className = 'edition-card' + (i === 0 ? ' current' : '');
        card.innerHTML = `
          <div style="font-size:1.4rem">${formatIcon[ed.format] || '📚'}</div>
          <div class="edition-format">${escHtml(ed.format)}</div>
          <div class="edition-year">${ed.year}</div>
          <div class="edition-isbn">ISBN: ${escHtml(ed.isbn)}</div>
          <div class="edition-price">${fmtPrice(ed.price)}</div>
          ${i === 0 ? '<span class="badge badge-orange" style="margin-top:4px">Edição atual</span>' : ''}
        `;
        grid.appendChild(card);
      });
    }

    // ── Nav search ───────────────────────────────────────────
    function handleNavSearch(e) {
      e.preventDefault();
      const q = document.getElementById('nav-input').value.trim();
      saveSearch(q);
      window.location.href = `results.html?q=${encodeURIComponent(q)}`;
    }

    init();
  </script>
</body>
</html>
