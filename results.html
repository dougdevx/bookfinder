<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resultados — BookSearch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <div class="navbar-top">
      <a class="nav-logo" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span class="logo-text">Book<span>Search</span></span>
      </a>
      <button class="nav-hamburger" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="navbar-links-row" id="navbar-links">
          <div class="nav-dropdown-menu" id="cat-dropdown"></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="results-layout">

    <aside class="sidebar">
      <div class="sidebar-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
        Filtros &amp; Ordenação
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Ordenar por</div>
        <div class="sort-options" id="sort-options">
          <label class="sort-option active">
            <input type="radio" name="sort" value="relevance" checked /> Relevância
          </label>
          <label class="sort-option">
            <input type="radio" name="sort" value="rating" /> Melhor avaliação
          </label>
          <label class="sort-option">
            <input type="radio" name="sort" value="price-asc" /> Menor preço
          </label>
          <label class="sort-option">
            <input type="radio" name="sort" value="price-desc" /> Maior preço
          </label>
          <label class="sort-option">
            <input type="radio" name="sort" value="title" /> Título (A–Z)
          </label>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Faixa de preço</div>
        <div class="price-range-wrap">
          <div class="price-inputs">
            <input type="number" id="price-min" placeholder="Mín" min="0" step="1" />
            <span>—</span>
            <input type="number" id="price-max" placeholder="Máx" min="0" step="1" />
          </div>
          <button class="btn-apply-filter" onclick="applyFilters()">Aplicar preço</button>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-title">Categorias</div>
        <div class="category-filter-list" id="cat-filter-list"></div>
      </div>
    </aside>

    <main class="results-main">
      <div class="results-header">
        <div>
          <div class="results-query" id="results-query">Resultados</div>
          <div class="results-count" id="results-count"></div>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grade">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="books-grid" id="books-grid"></div>

      <div class="pagination" id="pagination"></div>
    </main>
  </div>

  <footer>
    <p>Trabalho acadêmico — Banco de Dados · <strong>Amazon Book Dataset</strong></p>
  </footer>

  <script src="app.js"></script>
  <script>
    // ── State ────────────────────────────────────────────────
    let currentView     = 'grid';
    let currentPage     = 1;
    const PAGE_SIZE     = 8;
    let filteredBooks   = [];
    let activeCats      = [];

    // Sort param → radio value mapping
    const SORT_MAP = { reviews: 'reviews', rating: 'rating', year: 'year',
                       'price-asc': 'price-asc', 'price-desc': 'price-desc', title: 'title' };

    // ── Nav helpers ──────────────────────────────────────────
    function navTo(e, sort) {
      e.preventDefault();
      window.location.href = `results.html?sort=${sort}&q=`;
    }

    function toggleMobileNav() {
      document.getElementById('navbar-links').classList.toggle('open');
    }

    function toggleDropdown(el) {
      if (window.innerWidth <= 700) el.classList.toggle('open');
    }

    function buildNavDropdown() {
      const menu = document.getElementById('cat-dropdown');
      getAllCategories(MOCK_BOOKS).forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'nav-dropdown-item';
        btn.innerHTML = `<span class="cat-dot"></span>${cat}`;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `results.html?cat=${encodeURIComponent(cat)}&q=`;
        });
        menu.appendChild(btn);
      });
    }

    // highlight active nav link
    function highlightNav(sort) {
      const map = { reviews: 'nav-maisvendidos', rating: 'nav-rating', year: 'nav-year' };
      const id = map[sort];
      if (id) document.getElementById(id)?.classList.add('active');
    }

    // ── Init ────────────────────────────────────────────────
    function init() {
      buildNavDropdown();

      const params  = new URLSearchParams(window.location.search);
      const query   = params.get('q') ?? loadSearch();
      const sortParam = params.get('sort') || 'relevance';
      const catParam  = params.get('cat')  || '';

      saveSearch(query);
      highlightNav(sortParam);

      // Pre-tick sort radio
      if (SORT_MAP[sortParam]) {
        const radio = document.querySelector(`input[name="sort"][value="${SORT_MAP[sortParam]}"]`);
        if (radio) {
          radio.checked = true;
          document.querySelectorAll('.sort-option').forEach(l => l.classList.remove('active'));
          radio.parentElement.classList.add('active');
        }
      }

      buildCategoryFilters(catParam);
      applyFilters(query);

      // Sort radio listeners
      document.querySelectorAll('input[name="sort"]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.querySelectorAll('.sort-option').forEach(l => l.classList.remove('active'));
          radio.parentElement.classList.add('active');
          currentPage = 1;
          applyFilters();
        });
      });
    }

    // ── Build category checkboxes ────────────────────────────
    function buildCategoryFilters(preselect = '') {
      const list = document.getElementById('cat-filter-list');
      getAllCategories(MOCK_BOOKS).forEach(cat => {
        const label = document.createElement('label');
        label.className = 'category-filter-item';
        label.innerHTML = `<input type="checkbox" value="${cat}" ${cat === preselect ? 'checked' : ''} />${cat}`;
        const cb = label.querySelector('input');
        cb.addEventListener('change', () => {
          activeCats = [...document.querySelectorAll('#cat-filter-list input:checked')].map(c => c.value);
          currentPage = 1;
          applyFilters();
        });
        list.appendChild(label);
      });
      if (preselect) activeCats = [preselect];
    }

    // ── Apply all filters ────────────────────────────────────
    function applyFilters(forcedQuery) {
      const query    = forcedQuery !== undefined ? forcedQuery : '';
      const sortBy   = document.querySelector('input[name="sort"]:checked')?.value || 'relevance';
      const priceMin = parseFloat(document.getElementById('price-min').value) || 0;
      const priceMax = parseFloat(document.getElementById('price-max').value) || Infinity;

      filteredBooks = filterBooks({ books: MOCK_BOOKS, query, categories: activeCats, sortBy, priceMin, priceMax });

      const sortLabels = { reviews: 'Mais Vendidos', rating: 'Mais Avaliados', year: 'Novidades' };
      const params = new URLSearchParams(window.location.search);
      const sortParam = params.get('sort') || '';
      const catParam  = params.get('cat')  || '';

      const qEl = document.getElementById('results-query');
      if (sortLabels[sortParam])      qEl.innerHTML = `<span>${sortLabels[sortParam]}</span>`;
      else if (catParam)              qEl.innerHTML = `Categoria: <span>"${escHtml(catParam)}"</span>`;
      else if (query)                 qEl.innerHTML = `Resultados para: <span>"${escHtml(query)}"</span>`;
      else                            qEl.textContent = 'Todos os livros';

      document.getElementById('results-count').textContent =
        `${filteredBooks.length} livro${filteredBooks.length !== 1 ? 's' : ''} encontrado${filteredBooks.length !== 1 ? 's' : ''}`;

      renderPage();
    }

    // ── Render current page ──────────────────────────────────
    function renderPage() {
      const grid  = document.getElementById('books-grid');
      const start = (currentPage - 1) * PAGE_SIZE;
      const slice = filteredBooks.slice(start, start + PAGE_SIZE);

      grid.innerHTML = '';

      if (slice.length === 0) {
        grid.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-mid)">
            <div style="font-size:2.5rem;margin-bottom:12px">📭</div>
            <div style="font-weight:700;font-size:1.1rem;margin-bottom:6px">Nenhum livro encontrado</div>
            <div style="font-size:.9rem">Tente outros termos ou limpe os filtros.</div>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      slice.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.innerHTML = buildCardHTML(book);
        card.addEventListener('click', () => goToBook(book.id));
        grid.appendChild(card);
      });

      renderPagination();
    }

    // ── Build card HTML ──────────────────────────────────────
    function buildCardHTML(book) {
      const starsHTML = buildStarsHTML(book.rating);
      const catBadge  = book.categories[0]
        ? `<span class="badge badge-orange">${escHtml(book.categories[0])}</span>` : '';

      const coverHTML = book.coverUrl
        ? `<img class="book-cover-img" src="${book.coverUrl}" alt="${escHtml(book.title)}" loading="lazy" />`
        : `<div class="book-cover-placeholder">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
               <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
               <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
             </svg>
             <span>Sem capa</span>
           </div>`;

      return `
        <div class="book-card-cover">${coverHTML}</div>
        <div class="book-card-body">
          <div class="book-title">${escHtml(book.title)}</div>
          <div class="book-author">${escHtml(book.author)}</div>
          <div class="stars">${starsHTML}<span class="rating-label">${book.rating.toFixed(1)} (${book.reviews.toLocaleString('pt-BR')})</span></div>
          <div class="book-price">${fmtPrice(book.price)}</div>
        </div>
        <div class="book-card-footer">
          ${catBadge}
          <button class="btn-view-book">Ver detalhes</button>
        </div>
      `;
    }

    // ── Pagination ───────────────────────────────────────────
    function renderPagination() {
      const container = document.getElementById('pagination');
      const total = Math.ceil(filteredBooks.length / PAGE_SIZE);
      if (total <= 1) { container.innerHTML = ''; return; }

      let html = '';
      html += `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="15 18 9 12 15 6"/>
        </svg></button>`;

      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) {
          html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="gotoPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 2) {
          html += `<span style="align-self:center;color:var(--text-light)">…</span>`;
        }
      }

      html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <polyline points="9 18 15 12 9 6"/>
        </svg></button>`;

      container.innerHTML = html;
    }

    function gotoPage(p) {
      const total = Math.ceil(filteredBooks.length / PAGE_SIZE);
      if (p < 1 || p > total) return;
      currentPage = p;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── View toggle ──────────────────────────────────────────
    function setView(v) {
      currentView = v;
      const grid = document.getElementById('books-grid');
      grid.classList.toggle('list-view', v === 'list');
      document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
      document.getElementById('btn-list').classList.toggle('active', v === 'list');
    }

    // ── Navigate to book detail ──────────────────────────────
    function goToBook(id) {
      window.location.href = `book.html?id=${id}`;
    }

    // ── Stars HTML helper ────────────────────────────────────
    function buildStarsHTML(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        html += `<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <polygon points="10,1 12.9,7 19.5,7.6 14.5,12 16.2,18.5 10,15 3.8,18.5 5.5,12 0.5,7.6 7.1,7"
            class="${i <= Math.round(rating) ? 'star-filled' : 'star-empty'}" />
        </svg>`;
      }
      return html;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
